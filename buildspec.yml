version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies..."
      - pip install --upgrade pip
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Checking Lambda syntax..."
      - python -m py_compile lambda_function.py
      - echo "Build completed successfully."

artifacts:
  files:
    - lambda_function.py
    - requirements.txt
    - README.md